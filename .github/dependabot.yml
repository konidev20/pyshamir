version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"

  # Hash-pinned CI dependency files generated by pip-compile.
  - package-ecosystem: "pip"
    directory: "/requirements"
    schedule:
      interval: "weekly"
