# Manual release workflow for pyshamir.
#
# Trigger this from the Actions tab and pick a bump type (patch/minor/major).
# The workflow:
#   1. Uses mathieudutour/github-tag-action to compute the next semver tag
#      based on the chosen bump type and pushes it to origin.
#   2. Updates pyshamir/__init__.py in the workflow's working tree to the
#      new version (main is not modified).
#   3. Builds sdist + wheel.
#   4. Publishes to PyPI via OIDC trusted publishing.
#   5. Creates a GitHub release as a draft, uploads the artifacts, and
#      flips it out of draft state (drafts are required because GitHub
#      releases become immutable on publish, blocking later asset uploads).
#
# Periodically bump __version__ in main via a normal PR to keep the source
# tree in sync with the latest tag.

name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Type of version bump'
        type: choice
        options: [patch, minor, major]
        default: patch
        required: true

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Tag, build, and publish
    runs-on: ubuntu-latest
    if: github.actor == github.repository_owner
    permissions:
      contents: write    # for tag creation + GitHub release
      id-token: write    # for PyPI OIDC trusted publishing
    environment:
      name: pypi
      url: https://pypi.org/p/pyshamir
    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Compute next semver tag
        id: tag
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ inputs.bump }}
          tag_prefix: v

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install build (hash-pinned)
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements/build.txt

      - name: Sync __version__ in working tree to new tag
        env:
          NEW_VERSION: ${{ steps.tag.outputs.new_version }}
        run: sed -i -E "s/^__version__\s*=.*/__version__ = \"$NEW_VERSION\"/" pyshamir/__init__.py

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub release (draft) with artifacts
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          draft: true
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.whl

      - name: Publish the GitHub release (exits draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ steps.tag.outputs.new_tag }}" \
            --draft=false \
            --repo "${{ github.repository }}"
