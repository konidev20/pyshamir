# Manual release workflow for pyshamir, driven by semantic-release.
# See https://github.com/semantic-release/semantic-release.
#
# Trigger this from the Actions tab. semantic-release will:
#   1. Look at commits since the last tag and decide whether there is a
#      releasable change. Default behaviour: feat: -> minor, fix: -> patch,
#      BREAKING CHANGE: -> major. All other types (chore:, ci:, docs:,
#      build:, etc.) do NOT trigger a release.
#   2. Compute the next semver version, create the vX.Y.Z tag, and push it.
#   3. @semantic-release/exec runs the prepareCmd in .releaserc.json:
#      sed __version__ in pyshamir/__init__.py to the new version, then
#      build sdist + wheel via `python -m build`.
#   4. @semantic-release/github creates the GitHub release with the built
#      artifacts attached (using draft -> upload -> publish internally to
#      handle GitHub's release immutability).
#   5. A separate workflow step publishes to PyPI via OIDC trusted
#      publishing.
#
# If there are no releasable commits since the last tag, semantic-release
# exits 0 without doing anything; the PyPI step then no-ops because no
# wheel was built.

name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release via semantic-release
    runs-on: ubuntu-latest
    if: github.actor == github.repository_owner
    permissions:
      contents: write       # tag + GitHub release
      issues: write         # semantic-release may comment on issues
      pull-requests: write  # semantic-release may comment on PRs
      id-token: write       # PyPI OIDC trusted publishing
    environment:
      name: pypi
      url: https://pypi.org/p/pyshamir
    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false  # semantic-release uses GITHUB_TOKEN itself

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Install Python build deps (hash-pinned)
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements/build.txt

      - name: Install semantic-release and plugins
        run: |
          npm install --no-save \
            semantic-release@24 \
            @semantic-release/commit-analyzer@13 \
            @semantic-release/release-notes-generator@14 \
            @semantic-release/exec@7 \
            @semantic-release/github@11

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Publish to PyPI
        if: success() && hashFiles('dist/*.whl') != ''
        uses: pypa/gh-action-pypi-publish@release/v1
