name: Compatibility Test

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  compatibility:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install package
      run: |
        python -m pip install --upgrade pip
        pip install .
    
    - name: Test import and basic functionality
      run: |
        python -c "
        import pyshamir
        print(f'PyShamir version: {pyshamir.__version__}')
        
        # Test basic functionality
        secret = b'Hello, World!'
        parts = pyshamir.split(secret, 5, 3)
        reconstructed = pyshamir.combine(parts[:3])
        
        assert reconstructed == secret, 'Secret reconstruction failed'
        print('✓ Basic functionality test passed')
        print('✓ Package import and functionality verification completed successfully')
        " 