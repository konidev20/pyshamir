name: Unit Test & Reporting

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Fetch files
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      # CI dev tooling (test/lint) is version-pinned but not hash-pinned: it never
      # ships and Dependabot's regenerated lockfiles silently drop Python-conditional
      # transitives, breaking --require-hashes. Hash-pinning is kept for
      # requirements/build.txt in release.yml, where the artifact-building dep set
      # actually warrants supply-chain hardening.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/test.txt
      - name: Run pytest with coverage
        run: pytest --cov=pyshamir --cov-report=term-missing

  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install ruff and mypy
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/lint.txt
      - name: ruff check
        run: ruff check pyshamir tests
      - name: ruff format --check
        run: ruff format --check pyshamir tests
      - name: mypy --strict
        run: mypy pyshamir
