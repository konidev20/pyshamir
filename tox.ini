[tox]
envlist = py39,py310,py311,py312,py313,lint,type
skip_missing_interpreters = true

[testenv]
deps = coverage
commands =
    coverage run --source pyshamir -m unittest discover -p test_*.py
    coverage report -m

[testenv:lint]
deps = ruff
commands =
    ruff check pyshamir tests
    ruff format --check pyshamir tests

[testenv:type]
deps = mypy
commands = mypy pyshamir

[testenv:coverage]
deps = coverage
commands =
    coverage run --source pyshamir -m unittest discover -p test_*.py
    coverage xml
    coverage html
    coverage report -m
